# sources.yaml
# ============================================================================
# 本文件是整套"每日自动聚合规则"系统的唯一清单（人类维护的真相来源）。
# GitHub Action 每天读取本文件，按下面定义的 fetch 列表逐个下载，
# 合并、去重后生成 dist/ 目录下的成品规则文件。
#
# 不含任何敏感信息（订阅链接、secret 等），可以安全公开。
#
# 已知风险提示（人工判断，脚本不做任何法律判断）：
#   666OS/rules 仓库的 README 声明禁止转载发布到中国大陆境内的公共平台。
#   本仓库使用 GitHub Actions 每日拉取其内容并存入本仓库的 dist/ 目录，
#   这是否落入该条款的限制范围没有明确结论，使用者需自行判断风险。
# ============================================================================

# 每个 category 对应最终生成一个 dist/<category>.txt（classical格式，
# 内含 DOMAIN-SUFFIX / DOMAIN-KEYWORD / IP-CIDR 等明文规则，多源去重合并）
categories:

  # -------------------- 安全基础 --------------------
  ads:
    description: "广告与追踪域名拦截"
    fetch:
      - name: metacubex_ads
        url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs
        format: mrs
      - name: awavenue_ads
        url: https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
        format: clash_classical_yaml

  # -------------------- 局域网 / 国内基础 --------------------
